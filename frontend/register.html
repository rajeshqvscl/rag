<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FinRAG</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: radial-gradient(circle at 75% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 40%),
                        #050711;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #f8fafc;
        }

        .register-container {
            background: rgba(21, 23, 30, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 440px;
            padding: 40px 48px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #04659e9d 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: #f8fafc;
        }

        .tagline {
            color: #94a3b8;
            font-size: 14px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            text-align: center;
            margin-bottom: 28px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            width: 20px;
            height: 20px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px 14px 12px 44px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s;
            background: rgba(10, 11, 16, 0.6);
            color: #f8fafc;
        }

        input:focus {
            outline: none;
            border-color: #034453;
            background: rgba(10, 11, 16, 0.8);
        }

        input::placeholder {
            color: #64748b;
        }

        .password-hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #034453 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .btn-primary.loading .spinner {
            display: block;
        }

        .btn-primary.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #64748b;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 16px;
        }

        .btn-google {
            width: 100%;
            padding: 14px;
            background: rgba(10, 11, 16, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            color: #f8fafc;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-google:hover {
            background: rgba(10, 11, 16, 0.8);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .footer-text {
            color: #94a3b8;
            font-size: 14px;
        }

        .footer-link {
            color: #00d2ff;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-link:hover {
            text-decoration: underline;
        }

        .terms {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-top: 16px;
            line-height: 1.5;
        }

        .terms a {
            color: #00d2ff;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .register-container {
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo-section">
            <div class="logo">
                <div class="logo-icon">
                    <i data-lucide="rocket"></i>
                </div>
                <span class="logo-text">FinRAG</span>
            </div>
            <p class="tagline">Venture Intelligence Platform</p>
        </div>

        <h1>Create an account</h1>
        <p class="subtitle">Start analyzing pitch decks with AI</p>

        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>

        <form id="register-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <div class="input-wrapper">
                        <i data-lucide="user"></i>
                        <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i data-lucide="at-sign"></i>
                        <input type="text" id="username" name="username" placeholder="johndoe" required minlength="3">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <div class="input-wrapper">
                    <i data-lucide="mail"></i>
                    <input type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="password" name="password" placeholder="Create a password" required minlength="6">
                </div>
                <p class="password-hint">Must be at least 6 characters</p>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <i data-lucide="shield-check"></i>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="register-btn">
                <div class="spinner"></div>
                <span class="btn-text">Create Account</span>
            </button>
        </form>

        <div class="divider">
            <span>or sign up with</span>
        </div>

        <button class="btn-google" onclick="registerWithGoogle()">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google">
            Sign up with Google
        </button>

        <div class="footer">
            <p class="footer-text">
                Already have an account? 
                <a href="login.html" class="footer-link">Sign in</a>
            </p>
        </div>

        <p class="terms">
            By creating an account, you agree to our 
            <a href="#">Terms of Service</a> and 
            <a href="#">Privacy Policy</a>
        </p>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        const API_URL = 'http://localhost:9000';

        // Check if already logged in
        function checkAuth() {
            const token = localStorage.getItem('access_token');
            if (token) {
                window.location.href = 'index.html';
            }
        }
        checkAuth();

        // Handle register form submission
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('register-btn');
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            // Hide previous messages
            errorDiv.classList.remove('show');
            successDiv.classList.remove('show');
            
            // Validate passwords match
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Passwords do not match';
                errorDiv.classList.add('show');
                return;
            }
            
            // Show loading state
            btn.classList.add('loading');
            btn.disabled = true;
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password,
                        full_name: fullName
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    successDiv.textContent = 'Account created successfully! Redirecting to login...';
                    successDiv.classList.add('show');
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    errorDiv.textContent = data.detail || 'Registration failed. Please try again.';
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                errorDiv.textContent = 'Network error. Please check your connection.';
                errorDiv.classList.add('show');
            } finally {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });

        // Handle Google sign up (same as login)
        async function registerWithGoogle() {
            const btn = document.querySelector('.btn-google');
            btn.disabled = true;
            btn.style.opacity = '0.7';
            
            try {
                const response = await fetch(`${API_URL}/auth/google/login`);
                const data = await response.json();
                
                if (response.ok && data.authorization_url) {
                    // Redirect to Google OAuth
                    window.location.href = data.authorization_url;
                } else {
                    const errorDiv = document.getElementById('error-message');
                    errorDiv.textContent = data.detail || 'Google signup is not configured. Please contact administrator.';
                    errorDiv.classList.add('show');
                }
            } catch (error) {
                const errorDiv = document.getElementById('error-message');
                errorDiv.textContent = 'Network error. Please check your connection.';
                errorDiv.classList.add('show');
            } finally {
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        // Handle Google OAuth callback
        async function handleGoogleCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const error = urlParams.get('error');
            
            if (error) {
                const errorDiv = document.getElementById('error-message');
                errorDiv.textContent = 'Google authentication failed. Please try again.';
                errorDiv.classList.add('show');
                return;
            }
            
            if (code) {
                try {
                    const response = await fetch(`${API_URL}/auth/google/callback?code=${code}`);
                    const data = await response.json();
                    
                    if (response.ok && data.status === 'success') {
                        // Store tokens
                        localStorage.setItem('access_token', data.access_token);
                        localStorage.setItem('refresh_token', data.refresh_token);
                        localStorage.setItem('token_type', data.token_type);
                        
                        // Store user info
                        if (data.user) {
                            localStorage.setItem('user', JSON.stringify(data.user));
                        }
                        
                        // Redirect to main app
                        window.location.href = 'index.html';
                    } else {
                        const errorDiv = document.getElementById('error-message');
                        errorDiv.textContent = data.detail || 'Google signup failed. Please try again.';
                        errorDiv.classList.add('show');
                    }
                } catch (error) {
                    const errorDiv = document.getElementById('error-message');
                    errorDiv.textContent = 'Network error. Please check your connection.';
                    errorDiv.classList.add('show');
                }
            }
        }

        // Check for Google callback on page load
        handleGoogleCallback();
    </script>
</body>
</html>
