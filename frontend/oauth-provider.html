<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - OAuth Provider</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
        }
        
        .oauth-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }
        
        .oauth-card {
            background: white;
            border-radius: 12px;
            padding: 2.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        /* HubSpot Theme */
        .theme-hubspot .oauth-header {
            color: #ff7a59;
        }
        .theme-hubspot .btn-primary {
            background: #ff7a59;
        }
        .theme-hubspot .btn-primary:hover {
            background: #e66e4e;
        }
        
        /* Salesforce Theme */
        .theme-salesforce .oauth-header {
            color: #00a1e0;
        }
        .theme-salesforce .oauth-card {
            border-top: 4px solid #00a1e0;
        }
        .theme-salesforce .btn-primary {
            background: #00a1e0;
        }
        .theme-salesforce .btn-primary:hover {
            background: #0089c0;
        }
        
        /* Slack Theme */
        .theme-slack .oauth-header {
            color: #4a154b;
        }
        .theme-slack .oauth-card {
            border-top: 4px solid #4a154b;
        }
        .theme-slack .btn-primary {
            background: #4a154b;
        }
        .theme-slack .btn-primary:hover {
            background: #3a1040;
        }
        .theme-slack .logo-icon {
            background: #4a154b;
        }
        
        /* Gmail Theme */
        .theme-gmail .oauth-header {
            color: #ea4335;
        }
        .theme-gmail .oauth-card {
            border-top: 4px solid #ea4335;
        }
        .theme-gmail .btn-primary {
            background: #1a73e8;
        }
        .theme-gmail .btn-primary:hover {
            background: #1557b0;
        }
        
        /* GitHub Theme */
        .theme-github .oauth-header {
            color: #24292e;
        }
        .theme-github .oauth-card {
            border: 1px solid #e1e4e8;
        }
        .theme-github .btn-primary {
            background: #2ea44f;
        }
        .theme-github .btn-primary:hover {
            background: #2c974b;
        }
        
        .logo-section {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .logo-icon {
            width: 64px;
            height: 64px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            margin-bottom: 1rem;
        }
        
        .hubspot-icon { background: #ff7a59; }
        .salesforce-icon { background: #00a1e0; }
        .slack-icon { background: #4a154b; }
        .gmail-icon { background: linear-gradient(135deg, #ea4335, #fbbc05, #34a853, #4285f4); }
        .github-icon { background: #24292e; }
        
        .oauth-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .oauth-header p {
            color: #666;
            font-size: 0.9rem;
        }
        
        .app-info {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 1rem;
            margin: 1.5rem 0;
            text-align: center;
        }
        
        .app-info .app-name {
            font-weight: 600;
            color: #333;
        }
        
        .app-info .app-description {
            font-size: 0.85rem;
            color: #666;
            margin-top: 0.25rem;
        }
        
        .permissions {
            margin: 1.5rem 0;
        }
        
        .permissions h3 {
            font-size: 0.85rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .permission-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 0;
            font-size: 0.9rem;
            color: #555;
        }
        
        .permission-item svg {
            width: 20px;
            height: 20px;
            color: #10b981;
            flex-shrink: 0;
        }
        
        .input-group {
            margin-bottom: 1rem;
        }
        
        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            color: #333;
            margin-bottom: 0.4rem;
        }
        
        .input-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #6366f1;
        }
        
        .btn {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            color: white;
            margin-bottom: 0.75rem;
        }
        
        .btn-secondary {
            background: transparent;
            color: #666;
            border: 1px solid #ddd;
        }
        
        .btn-secondary:hover {
            background: #f5f5f5;
        }
        
        .security-note {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #888;
        }
        
        .security-note svg {
            width: 14px;
            height: 14px;
            vertical-align: middle;
            margin-right: 0.25rem;
        }
        
        .account-hint {
            text-align: center;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: #e8f4fd;
            border-radius: 6px;
            font-size: 0.85rem;
            color: #0066cc;
        }
        
        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
        }
        
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }
        
        .divider span {
            background: white;
            padding: 0 1rem;
            position: relative;
            color: #888;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="oauth-container" id="oauth-container">
        <!-- Dynamic content loaded based on integration -->
    </div>

    <script>
        // Parse URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const integration = urlParams.get('integration') || 'hubspot';
        const state = urlParams.get('state') || '';
        const redirectUri = urlParams.get('redirect_uri') || '';
        
        const INTEGRATION_CONFIGS = {
            hubspot: {
                name: 'HubSpot',
                icon: 'H',
                iconClass: 'hubspot-icon',
                description: 'CRM & Marketing Platform',
                scope: ['Read contacts', 'Write contacts', 'Read companies'],
                loginHint: 'Sign in with your HubSpot account',
                fields: [
                    { id: 'email', label: 'Email', type: 'email', placeholder: 'you@company.com' },
                    { id: 'password', label: 'Password', type: 'password', placeholder: '••••••••' }
                ]
            },
            salesforce: {
                name: 'Salesforce',
                icon: '☁',
                iconClass: 'salesforce-icon',
                description: 'Enterprise CRM',
                scope: ['Access API', 'Refresh token', 'Manage data'],
                loginHint: 'Sign in to your Salesforce organization',
                fields: [
                    { id: 'username', label: 'Username', type: 'text', placeholder: 'you@company.com' },
                    { id: 'password', label: 'Password', type: 'password', placeholder: '••••••••' }
                ]
            },
            slack: {
                name: 'Slack',
                icon: '#',
                iconClass: 'slack-icon',
                description: 'Team Messaging',
                scope: ['Post messages', 'Read channels', 'Access workspace info'],
                loginHint: 'Sign in to your Slack workspace',
                fields: [
                    { id: 'workspace', label: 'Workspace URL', type: 'text', placeholder: 'company.slack.com' },
                    { id: 'email', label: 'Email', type: 'email', placeholder: 'you@company.com' },
                    { id: 'password', label: 'Password', type: 'password', placeholder: '••••••••' }
                ]
            },
            gmail: {
                name: 'Google',
                icon: 'G',
                iconClass: 'gmail-icon',
                description: 'Gmail Integration',
                scope: ['Send emails', 'Read inbox', 'Access contacts'],
                loginHint: 'Sign in with your Google account',
                fields: [
                    { id: 'email', label: 'Email or phone', type: 'email', placeholder: 'you@gmail.com' },
                    { id: 'password', label: 'Password', type: 'password', placeholder: '••••••••' }
                ]
            },
            github: {
                name: 'GitHub',
                icon: '</>',
                iconClass: 'github-icon',
                description: 'Code Repository',
                scope: ['Access repositories', 'Read user profile', 'Manage webhooks'],
                loginHint: 'Sign in to GitHub',
                fields: [
                    { id: 'username', label: 'Username or email', type: 'text', placeholder: 'username' },
                    { id: 'password', label: 'Password', type: 'password', placeholder: '••••••••' }
                ]
            }
        };
        
        const config = INTEGRATION_CONFIGS[integration] || INTEGRATION_CONFIGS.hubspot;
        
        function renderOAuthPage() {
            const container = document.getElementById('oauth-container');
            container.className = 'oauth-container theme-' + integration;
            
            let fieldsHtml = '';
            config.fields.forEach(field => {
                fieldsHtml += `
                    <div class="input-group">
                        <label for="${field.id}">${field.label}</label>
                        <input type="${field.type}" id="${field.id}" placeholder="${field.placeholder}" required>
                    </div>
                `;
            });
            
            let permissionsHtml = '';
            config.scope.forEach(perm => {
                permissionsHtml += `
                    <div class="permission-item">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                        <span>${perm}</span>
                    </div>
                `;
            });
            
            container.innerHTML = `
                <div class="oauth-card">
                    <div class="logo-section">
                        <div class="logo-icon ${config.iconClass}">${config.icon}</div>
                        <div class="oauth-header">
                            <h2>Sign in to ${config.name}</h2>
                            <p>${config.loginHint}</p>
                        </div>
                    </div>
                    
                    <div class="account-hint">
                        <strong>FinRAG</strong> wants to access your ${config.name} account
                    </div>
                    
                    <form id="oauth-form">
                        ${fieldsHtml}
                        <button type="submit" class="btn btn-primary">Sign In & Authorize</button>
                    </form>
                    
                    <button class="btn btn-secondary" onclick="cancelOAuth()">Cancel</button>
                    
                    <div class="divider">
                        <span>Permissions requested</span>
                    </div>
                    
                    <div class="permissions">
                        ${permissionsHtml}
                    </div>
                    
                    <div class="security-note">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        Secure OAuth 2.0 authentication
                    </div>
                </div>
            `;
            
            // Handle form submission
            document.getElementById('oauth-form').addEventListener('submit', handleOAuthSubmit);
        }
        
        function handleOAuthSubmit(e) {
            e.preventDefault();
            
            // Simulate authentication delay
            const btn = e.target.querySelector('.btn-primary');
            btn.textContent = 'Signing in...';
            btn.disabled = true;
            
            setTimeout(() => {
                // Generate authorization code
                const authCode = 'auth_' + Math.random().toString(36).substring(2, 15);
                
                // Build callback URL
                const callbackUrl = new URL(redirectUri);
                callbackUrl.searchParams.set('code', authCode);
                callbackUrl.searchParams.set('state', state);
                
                // Redirect to callback
                window.location.href = callbackUrl.toString();
            }, 1500);
        }
        
        function cancelOAuth() {
            if (window.opener) {
                window.opener.postMessage({
                    type: 'oauth-error',
                    error: 'user_cancelled',
                    details: 'User cancelled the OAuth flow'
                }, '*');
                window.close();
            } else {
                // Redirect back with error
                const callbackUrl = new URL(redirectUri);
                callbackUrl.searchParams.set('error', 'access_denied');
                callbackUrl.searchParams.set('error_description', 'User cancelled the authorization');
                callbackUrl.searchParams.set('state', state);
                window.location.href = callbackUrl.toString();
            }
        }
        
        // Render the page
        renderOAuthPage();
    </script>
</body>
</html>
