name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Install Hugging Face CLI
        run: pip install huggingface_hub

      - name: Deploy to Spaces (Pro Connector)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli upload msra134/finrag . . --repo-type=space --token=$HF_TOKEN
