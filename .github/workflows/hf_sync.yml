name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Push to hub
        uses: huggingface/huggingface-action@v1
        with:
          repo_id: msra134/finrag
          repo_type: space
          hf_token: ${{ secrets.HF_TOKEN }}
